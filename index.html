<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Simulator - Mô phỏng bay drone thực tế</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #87CEEB; /* Sky blue */
        }
        #info-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px;
            border-radius: 5px;
            max-width: 300px;
            font-size: 14px;
            line-height: 1.5;
        }
        #controls-help {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px;
            border-radius: 5px;
            max-width: 400px;
            font-size: 13px;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="info-panel">
        <h2>Thông tin drone</h2>
        <p id="altitude">Độ cao: 0.00 m</p>
        <p id="velocity">Vận tốc: 0.00, 0.00, 0.00 m/s</p>
        <p id="attitude">Góc nghiêng: 0.00°, 0.00°, 0.00° (roll, pitch, yaw)</p>
        <p id="motor-speed">Tốc độ motore: [0, 0, 0, 0] RPM</p>
        <p id="battery">Pin: 100%</p>
    </div>

    <div id="controls-help">
        <h3>Điều khiển:</h3>
        <p>W/S: Tiến/lùi</p>
        <p>A/D: Trái/phải</p>
        <p>Space/Shift: Lên/xuống</p>
        <p>Q/E: Yaw trái/phải</p>
        <p>Click chuột + di chuyển: Xoay view</p>
        <p>R: Reset drone</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
